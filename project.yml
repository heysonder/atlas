name: Atlas
options:
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  PipedKit:
    path: PipedKit

targets:
  Atlas:
    type: application
    platform: iOS
    sources:
      - path: Atlas
    dependencies:
      - package: PipedKit
    info:
      path: Atlas/Resources/Info.plist
      properties:
        CFBundleDisplayName: Atlas
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes: [audio]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Atlas connects to self-hosted Piped instances on your local network.
        # iPhone supports portrait and landscape. Upside-down is intentionally omitted.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad: all four orientations are required for multitasking (Split View /
        # Slide Over) unless the app is full-screen-only.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.cmf.atlas
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        # 1 = iPhone, 2 = iPad → Universal.
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES

  AtlasTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AtlasTests
    dependencies:
      - target: Atlas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.cmf.atlas.tests
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Atlas.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Atlas"
        BUNDLE_LOADER: "$(TEST_HOST)"
